<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rachel &amp; Andy's Wedding Escape Room</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Permanent+Marker&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div id="game">
    <h1>Rachel &amp; Andy's Wedding Escape Room</h1>

    <div id="scene" class="scene">

      <!-- ===== WHITE WALL (front / start) ===== -->
      <div class="wall" data-wall="white">
        <img class="bg" src="images/wall-white.svg" alt="White wall" />
        <div class="hotspot" id="door"        style="left:40%; top:24%; width:20%; height:57.48%;"></div>
        <div class="hotspot" id="hook-key"    style="left:24%; top:34%; width:7%;  height:22%;"></div>
        <div class="hotspot" id="shelf-bell"  style="left:64%; top:46%; width:12%; height:18%;"></div>
        <div class="hotspot" id="welcome-mat" style="left:37%; top:82%; width:26%; height:14%;"></div>
        <div class="hotspot button" data-color="white" style="left:80%; top:18%; width:7%; height:12%;"></div>
      </div>

      <!-- ===== ORANGE WALL (right) ===== -->
      <div class="wall" data-wall="orange">
        <img class="bg" src="images/wall-orange.svg" alt="Orange wall" />
        <div id="orange-glow" class="hidden" style="left:38%; top:44%; width:24%; height:30%;"></div>
        <div class="hotspot hidden" id="drawer" style="left:42%; top:48%; width:16%; height:18%;"></div>
        <div class="hotspot button" data-color="orange" style="left:80%; top:18%; width:7%; height:12%;"></div>
      </div>

      <!-- ===== YELLOW WALL (back) ===== -->
      <div class="wall" data-wall="yellow">
        <img class="bg" src="images/wall-yellow.svg" alt="Yellow wall" />
        <div id="yellow-message"><span class="ink">Put the</span> Ring <span class="ink">on</span> the Doorbell to Escape</div>
        <div class="hotspot button" data-color="yellow" style="left:80%; top:18%; width:7%; height:12%;"></div>
      </div>

      <!-- ===== MAGENTA WALL (left) ===== -->
      <div class="wall" data-wall="magenta">
        <img class="bg" src="images/wall-magenta.svg" alt="Magenta wall" />
        <!-- key slots are generated by js/game.js -->
        <div class="hotspot button" data-color="magenta" style="left:80%; top:18%; width:7%; height:12%;"></div>
      </div>

      <!-- ===== Overlays / controls ===== -->
      <div id="lighting"></div>
      <div class="turn turn-left"  id="turn-left">&#8249;</div>
      <div class="turn turn-right" id="turn-right">&#8250;</div>
      <div id="toast" class="toast"></div>
    </div>

    <div class="inventory">
      <span class="inv-label">Inventory</span>
      <div id="inv-items" class="inv-items"></div>
    </div>

    <p class="hint">Click the left/right edges to turn and face the other walls.</p>
  </div>

  <!-- ===== Modal ===== -->
  <div id="modal" class="modal hidden">
    <div class="modal-backdrop" id="modal-backdrop"></div>
    <div class="modal-content" id="modal-content">
      <button class="modal-close" id="modal-close" aria-label="Close">&times;</button>
      <div id="modal-body"></div>
    </div>
  </div>

  <script src="js/game.js"></script>
</body>
</html>
